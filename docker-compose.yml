services:
  # PostgreSQL Database with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cheltuieli_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cheltuieli_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cheltuieli_pass_2024}
      POSTGRES_DB: ${POSTGRES_DB:-cheltuieli}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cheltuieli_user} -d ${POSTGRES_DB:-cheltuieli}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API - Python FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cheltuieli_api
    restart: unless-stopped
    command: ["gunicorn", "app.main:app", "-w", "1", "-k", "uvicorn.workers.UvicornWorker", "-b", "0.0.0.0:8000", "--access-logfile", "-", "--timeout", "300"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cheltuieli_user}:${POSTGRES_PASSWORD:-cheltuieli_pass_2024}@postgres:5432/${POSTGRES_DB:-cheltuieli}
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://10.170.7.53:11435}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "False"
      TZ: Europe/Bucharest
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend/app:/app/app
      - ./data/asterisk:/mnt/asterisk:ro
      - ./.set:/opt/cheltuieli-v2.1/.set:ro
      - models_data:/app/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Worker — ML training (RF + LGB) + Playwright scraping (izolat de API)
  cheltuieli_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cheltuieli_worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cheltuieli_user}:${POSTGRES_PASSWORD:-cheltuieli_pass_2024}@postgres:5432/${POSTGRES_DB:-cheltuieli}
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      TZ: Europe/Bucharest
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend/app:/app/app
      - models_data:/app/models
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend - React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cheltuieli_ui
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.ts:/app/vite.config.ts
    ports:
      - "31000:3000"
    depends_on:
      - backend

  # Umami Analytics — internal DB (not exposed to host, Docker-network only)
  umami_db:
    image: postgres:16-alpine
    container_name: umami_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami_pass_2024}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Umami Analytics dashboard — accessible on host port 30002
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: cheltuieli_umami
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami_pass_2024}@umami_db:5432/umami
      APP_SECRET: ${UMAMI_SECRET:-change-this-umami-secret}
    ports:
      - "30002:3000"
    depends_on:
      umami_db:
        condition: service_healthy

  # Traccar GPS Tracking Server
  traccar:
    image: traccar/traccar:latest
    container_name: cheltuieli_traccar
    restart: unless-stopped
    volumes:
      - ./docker/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar_data:/opt/traccar/data
      - traccar_logs:/opt/traccar/logs
    ports:
      - "30003:8082"
      - "5055:5055"
      - "5027:5027"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/api/server || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  umami_db_data:
  traccar_data:
  traccar_logs:
  models_data:

networks:
  default:
    name: cheltuieli_network
